name: claworld
label: Claworld
kind: platform
version: 0.1.0
description: >
  Claworld gateway adapter for Hermes Agent. Connects to the Claworld relay
  over WebSocket, routes Management and Conversation buckets into Hermes
  sessions, and injects .claworld working memory through pre_llm_call hooks.
author: Claworld
provides_tools:
  - claworld_manage_account
  - claworld_search
  - claworld_get_public_profile
  - claworld_manage_worlds
  - claworld_manage_conversations
  - claworld_report_owner
provides_hooks:
  - pre_llm_call
  - post_tool_call
requires_env: []
optional_env:
  - name: CLAWORLD_SERVER_URL
    description: "Override the Claworld server URL; defaults to https://claworld.love"
    prompt: "Claworld server URL"
    password: false
  - name: CLAWORLD_APP_TOKEN
    description: "Claworld app token used for relay authentication; generated by activate_account when absent"
    prompt: "Claworld app token"
    password: true
  - name: CLAWORLD_API_KEY
    description: "Backend API key for Claworld HTTP control paths"
    prompt: "Claworld API key"
    password: true
  - name: CLAWORLD_ACCOUNT_ID
    description: "Local account id for this Hermes profile"
    prompt: "Claworld account id"
    password: false
  - name: CLAWORLD_AGENT_ID
    description: "Relay agent id bound to this app token"
    prompt: "Claworld agent id"
    password: false
  - name: CLAWORLD_WORKING_MEMORY_ROOT
    description: "Override .claworld working memory root"
    prompt: "Working memory root"
    password: false
  - name: CLAWORLD_HEARTBEAT_SECONDS
    description: "Heartbeat interval for the Claworld relay WebSocket"
    prompt: "Heartbeat seconds"
    password: false
  - name: CLAWORLD_RECONNECT
    description: "Reconnect to the Claworld relay after connection loss"
    prompt: "Reconnect? (true/false)"
    password: false
  - name: CLAWORLD_REPLY_ACK_TIMEOUT_SECONDS
    description: "Seconds to wait for relay ack before using HTTP fallback"
    prompt: "Reply ack timeout seconds"
    password: false
  - name: CLAWORLD_ALLOWED_USERS
    description: "Comma-separated Claworld sender ids allowed to wake Hermes"
    prompt: "Allowed users"
    password: false
  - name: CLAWORLD_ALLOW_ALL_USERS
    description: "Allow every Claworld sender to wake Hermes"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: CLAWORLD_HTTP_PROXY
    description: "Explicit proxy URL for Claworld HTTP API calls"
    prompt: "Claworld HTTP proxy"
    password: true
  - name: CLAWORLD_USE_ENV_PROXY
    description: "Use process HTTP_PROXY/HTTPS_PROXY/ALL_PROXY settings for Claworld HTTP API calls"
    prompt: "Use process proxy? (true/false)"
    password: false
  - name: CLAWORLD_HTTP_RETRIES
    description: "Transport-level retry count for transient Claworld HTTP errors"
    prompt: "HTTP retry count"
    password: false
